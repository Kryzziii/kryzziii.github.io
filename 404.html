<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#F5F5F7">
    <title>Page not found | Chris Jemming</title>
    <link rel="stylesheet" href="css/main.css">

    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="author" href="/humans.txt">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="js/components.js" defer></script>
    <script src="js/main.js" defer></script>
    <script src="js/command-palette.js" defer></script>
    <script src="js/terminal-mode.js" defer></script>

    <script>
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) { document.documentElement.setAttribute('data-theme', savedTheme); }
        if (localStorage.getItem('terminal_mode') === 'on') { document.documentElement.classList.add('terminal-mode'); }
    </script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            document.body.classList.add('preload');
            setTimeout(() => { document.body.classList.remove('preload'); }, 200);
        });
    </script>
</head>

<body class="preload error-page">

<app-navbar></app-navbar>

<main class="container">
    <section class="glass-card error-showcase fade-in" aria-labelledby="error-title">
        <div class="error-copy">
            <p class="error-eyebrow">404 • Wrong turn</p>
            <h1 class="error-code">404</h1>
            <h2 id="error-title" class="error-title">Oops! Page not found.</h2>
            <p class="error-desc">
                The page you are looking for does not exist or has been moved.
            </p>

            <div class="error-actions">
                <a href="index.html" class="btn-action">
                    <i class="fa-solid fa-house"></i> Back to Home
                </a>
            </div>
        </div>
    </section>

</main>

<app-footer></app-footer>
</body>
</html>
