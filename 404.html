<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#F5F5F7">
    <title>Page not found | Chris Jemming</title>
    <link rel="stylesheet" href="css/main.css">

    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="js/components.js" defer></script>
    <script src="js/main.js" defer></script>
    <script src="js/command-palette.js" defer></script>
    <script src="js/snake-game.js" defer></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            document.body.classList.add('preload');
            setTimeout(() => { document.body.classList.remove('preload'); }, 200);
        });
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) { document.documentElement.setAttribute('data-theme', savedTheme); }
    </script>
</head>

<body class="preload error-page">

<div class="background-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
</div>

<!-- Full-page background runner game -->
<canvas id="snake-canvas" aria-label="Jump and run mini-game"></canvas>

<!-- Floating game HUD -->
<div id="snake-hud" class="snake-hud">
    <p class="snake-hint">Jump with Space, ↑, W or tap</p>
    <div class="snake-stats">
        <span>Distance: <strong id="snake-score">0</strong></span>
        <span>Best: <strong id="snake-highscore">0</strong></span>
    </div>
    <div class="snake-actions">
        <button id="snake-start-pause" class="btn-action" type="button">Start</button>
        <button id="snake-restart" class="btn-ghost" type="button">Restart</button>
    </div>
</div>

<!-- Game Over Overlay -->
<div id="snake-overlay" class="snake-overlay" hidden>
    <p id="snake-overlay-text">Game Over — Distance: 0</p>
    <button id="snake-overlay-btn" class="btn-action" type="button">Run again</button>
</div>

<app-navbar></app-navbar>

<main class="container">
    <section class="glass-card error-showcase fade-in" aria-labelledby="error-title">
        <div class="error-copy">
            <p class="error-eyebrow">404 • Wrong turn</p>
            <h1 class="error-code">404</h1>
            <h2 id="error-title" class="error-title">Oops! Page not found.</h2>
            <p class="error-desc">
                The page you are looking for does not exist or has been moved. An endless runner game is playing in the background — jump with Space, W, ↑ or a tap.
            </p>

            <div class="error-actions">
                <a href="index.html" class="btn-action">
                    <i class="fa-solid fa-house"></i> Back to Home
                </a>
            </div>
        </div>
    </section>

</main>

<app-footer></app-footer>
</body>
</html>
