<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#F5F5F7">
    <title>Page not found | Chris Jemming</title>
    <link rel="stylesheet" href="css/main.css">

    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="js/components.js" defer></script>
    <script src="js/main.js" defer></script>
    <script src="js/command-palette.js" defer></script>
    <script src="js/snake-game.js" defer></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            document.body.classList.add('preload');
            setTimeout(() => { document.body.classList.remove('preload'); }, 200);
        });
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) { document.documentElement.setAttribute('data-theme', savedTheme); }
    </script>
</head>

<body class="preload error-page">

<div class="background-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
</div>

<app-navbar></app-navbar>

<main class="container">

    <div class="error-container fade-in">

        <div class="glass-card" style="padding: 60px 40px; display: inline-block; margin-bottom: 30px;">
            <h1 class="error-code">404</h1>
        </div>

        <h2 class="error-title">Oops! Page not found.</h2>
        <p class="error-desc">
            The page you are looking for does not exist or has been moved. Maybe you made a typo?
        </p>

        <a href="index.html" class="btn-action" style="align-self: center;">
            <i class="fa-solid fa-house"></i> Back to Home
        </a>

    </div>

    <section class="glass-card snake-card fade-in" aria-label="Snake mini-game section">
        <h3>While you're here… 🐍</h3>
        <p class="snake-subline">Use arrow keys or WASD. On mobile, swipe.</p>

        <div class="snake-stats">
            <span>Score: <strong id="snake-score">0</strong></span>
            <span>High Score: <strong id="snake-highscore">0</strong></span>
        </div>

        <div class="snake-canvas-wrap">
            <canvas id="snake-canvas" width="400" height="400" aria-label="Snake mini-game"></canvas>
            <div id="snake-overlay" class="snake-overlay" hidden>
                <p id="snake-overlay-text">Game Over — Score: 0</p>
                <button id="snake-overlay-btn" class="btn-action" type="button">Play again</button>
            </div>
        </div>

        <div class="snake-actions">
            <button id="snake-start-pause" class="btn-action" type="button">Start</button>
            <button id="snake-restart" class="btn-ghost" type="button">Restart</button>
        </div>
    </section>

</main>

<app-footer></app-footer>

<script src="js/main.js"></script>
</body>
</html>
